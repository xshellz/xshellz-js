name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing (OIDC) needs npm >= 11.5.1; the runner's default lags.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      # First release: authenticates with the NPM_TOKEN repo secret (npm can't
      # OIDC-publish a package that doesn't exist yet). Once the package exists
      # and a trusted publisher is configured on npmjs.com, the secret is
      # deleted and this env line removed — OIDC takes over.
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
