name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Trusted publishing (OIDC) needs npm >= 11.5.1; the runner's default lags.
      # Auth comes from the trusted publisher configured on npmjs.com
      # (xshellz/xshellz-js, release.yml) via id-token: write — no tokens.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --access public --provenance
